name: CD

on:
  workflow_run:
    workflows: ["CI"]  # ← nombre exacto del workflow de arriba
    types: [completed]
    branches: [main]
  push:
    tags: ["v*"]  # ← tags no pasan por workflow_run, se triggerean directo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Si vino de workflow_run, solo continúa si CI pasó.
    # Si vino de un tag, no hay workflow_run event, así que la condición lo permite.
    if: >
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}