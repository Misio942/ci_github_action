name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/${{ github.repository }}

# Cancela runs obsoletos del mismo branch/PR/tag para feedback rápido
# y para no desperdiciar runners (clave en trunk-based).
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: flake8 app tests

      - name: Test
        run: pytest

  # Gate con nombre estable para usar como required status check en el ruleset
  # de main. Así el check requerido no depende de la versión de la matriz.
  ci-gate:
    name: CI Gate
    needs: ci
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verificar resultado de CI
        run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            echo "CI falló (result=${{ needs.ci.result }})"
            exit 1
          fi
          echo "CI OK"

  cd-qa:
    name: Build & Push (QA)
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=raw,value=qa

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  cd-prod:
    name: Build & Push (Prod)
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=true
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Deploy simulado: hace pull de la imagen recién publicada, la levanta y
  # verifica /health.
  # ---------------------------------------------------------------------------
  
  deploy-qa:
    name: Deploy (QA)
    needs: cd-qa
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull de la imagen QA
        run: docker pull "${IMAGE}:qa"

      - name: Levantar contenedor
        run: docker run -d --name app -p 5000:5000 "${IMAGE}:qa"

      - name: Smoke test /health
        run: |
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:5000/health | grep -q '"status":"ok"'; then
              echo "Servicio QA saludable"
              exit 0
            fi
            echo "Esperando al servicio... ($i)"
            sleep 2
          done
          echo "El servicio no respondió saludable a tiempo"
          docker logs app
          exit 1

      - name: Limpiar contenedor
        if: always()
        run: docker rm -f app || true

  deploy-prod:
    name: Deploy (Prod)
    needs: cd-prod
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull de la imagen Prod
        run: docker pull "${IMAGE}:latest"

      - name: Levantar contenedor
        run: docker run -d --name app -p 5000:5000 "${IMAGE}:latest"

      - name: Smoke test /health
        run: |
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:5000/health | grep -q '"status":"ok"'; then
              echo "Servicio Prod saludable"
              exit 0
            fi
            echo "Esperando al servicio... ($i)"
            sleep 2
          done
          echo "El servicio no respondió saludable a tiempo"
          docker logs app
          exit 1

      - name: Limpiar contenedor
        if: always()
        run: docker rm -f app || true
